<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Victory Fit — Sportivement Metz.</title>
  <link rel="icon" type="image/png" href="assets/logo-version-b-icon.png">

  <!--
    FONT NOTE (Production):
    Replace Bebas Neue with Domus Titling (Bold / Semi-Bold) via @font-face.
    Replace Inter with New Zen (Medium / Regular) via @font-face.
    These Google Fonts are stand-ins for the demo only.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ───────────────────────────── RESET & BASE ───────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif; /* Production: New Zen */
      background: #0A0A0A;
      color: #FFFFFF;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ───────────────────────────── VARIABLES ───────────────────────────── */
    :root {
      --burgundy: #7A1B1F;
      --orange: #F29031;
      --orange-deep: #EF6C3E;
      --bg: #0A0A0A;
      --white: #FFFFFF;
      --white-70: rgba(255, 255, 255, 0.7);
      --white-10: rgba(255, 255, 255, 0.1);
      --gradient: linear-gradient(135deg, #F29031, #EF6C3E, #7A1B1F);
      --gradient-text: linear-gradient(135deg, #F29031, #EF6C3E, #7A1B1F);
    }

    /* ───────────────────────────── HERO SECTION ───────────────────────────── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Background layers */
    .hero__bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hero__bg-image {
      position: absolute;
      inset: 0;
      background:
        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1920&q=80')
        center center / cover no-repeat;
      opacity: 0.4;
    }

    .hero__bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(10, 10, 10, 0.85) 0%,
        rgba(10, 10, 10, 0.7) 50%,
        rgba(10, 10, 10, 0.95) 100%
      );
    }

    .hero__bg-glow {
      position: absolute;
      top: -20%;
      right: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(
        ellipse at center,
        rgba(242, 144, 49, 0.15) 0%,
        rgba(122, 27, 31, 0.10) 40%,
        transparent 70%
      );
      filter: blur(60px);
      animation: glowPulse 6s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      0%   { opacity: 0.6; transform: scale(1); }
      100% { opacity: 1;   transform: scale(1.08); }
    }

    /* ───────────────────────────── NAVBAR ───────────────────────────── */
    .navbar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 3rem;
    }

    .navbar__logo img {
      height: 44px;
      width: auto;
    }

    .navbar__links {
      display: flex;
      align-items: center;
      gap: 2rem;
      list-style: none;
    }

    .navbar__links a {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.875rem;
      color: var(--white-70);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: color 0.3s ease;
    }

    .navbar__links a:hover {
      color: var(--white);
    }

    .navbar__cta {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.6rem 1.5rem;
      background: var(--gradient);
      color: #0A0A0A;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    .navbar__cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(242, 144, 49, 0.35);
    }

    /* Mobile nav toggle */
    .navbar__toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }

    .navbar__toggle span {
      width: 24px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    /* ───────────────────────────── HERO BODY (2-col) ───────────────────────────── */
    .hero__body {
      position: relative;
      z-index: 5;
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 3rem 2rem;
      gap: 2rem;
    }

    /* ───────────────────────────── HERO CONTENT (left col) ───────────────────────────── */
    .hero__content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ───────────────────────────── HERO VISUAL (right col) ───────────────────────────── */
    .hero__visual {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;

      opacity: 0;
      transform: translateX(30px);
      animation: fadeSlideLeft 1s ease-out 0.6s forwards;
    }

    .hero__visual img {
      width: clamp(280px, 28vw, 460px);
      height: auto;
    }

    @keyframes fadeSlideLeft {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .hero__title {
      font-family: 'Bebas Neue', sans-serif; /* Production: Domus Titling Bold */
      font-size: clamp(3.5rem, 8vw, 7rem);
      line-height: 1;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;

      opacity: 0;
      transform: translateY(30px);
      animation: fadeSlideUp 0.8s ease-out 0.2s forwards;
    }

    .hero__title .gradient-word {
      background: var(--gradient-text);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero__subtitle {
      font-size: clamp(1rem, 1.8vw, 1.25rem);
      line-height: 1.7;
      color: var(--white-70);
      max-width: 520px;
      margin-bottom: 2.5rem;

      opacity: 0;
      transform: translateY(25px);
      animation: fadeSlideUp 0.8s ease-out 0.5s forwards;
    }

    .hero__subtitle strong {
      color: var(--white);
      font-weight: 600;
    }

    /* ───────────────────────────── CTA BUTTONS ───────────────────────────── */
    .hero__ctas {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;

      opacity: 0;
      transform: translateY(20px);
      animation: fadeSlideUp 0.8s ease-out 0.7s forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.125rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.85rem 2rem;
      border-radius: 4px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.3s ease, background 0.3s ease, color 0.3s ease;
    }

    .btn--primary {
      background: var(--gradient);
      color: #0A0A0A;
      border: none;
      position: relative;
      overflow: hidden;
    }

    .btn--primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.2) 50%,
        transparent 100%
      );
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .btn--primary:hover::before {
      transform: translateX(100%);
    }

    .btn--primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(242, 144, 49, 0.35);
    }

    .btn--secondary {
      background: transparent;
      color: var(--white);
      border: 1.5px solid var(--white-10);
      backdrop-filter: blur(4px);
    }

    .btn--secondary:hover {
      background: var(--gradient);
      color: #0A0A0A;
      border-color: transparent;
      transform: translateY(-2px);
    }

    .btn__arrow {
      transition: transform 0.3s ease;
    }

    .btn--secondary:hover .btn__arrow {
      transform: translateX(4px);
    }

    /* ───────────────────────────── STATS BAR ───────────────────────────── */
    .stats {
      position: relative;
      z-index: 5;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid var(--white-10);
      margin: 0 3rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      position: relative;

      opacity: 0;
      transform: translateY(20px);
    }

    .stat:nth-child(1) { animation: fadeSlideUp 0.6s ease-out 0.9s forwards; }
    .stat:nth-child(2) { animation: fadeSlideUp 0.6s ease-out 1.0s forwards; }
    .stat:nth-child(3) { animation: fadeSlideUp 0.6s ease-out 1.1s forwards; }
    .stat:nth-child(4) { animation: fadeSlideUp 0.6s ease-out 1.2s forwards; }

    /* Vertical dividers between stats */
    .stat + .stat::before {
      content: '';
      position: absolute;
      left: 0;
      top: 25%;
      height: 50%;
      width: 1px;
      background: var(--white-10);
    }

    .stat__number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.75rem, 3vw, 2.5rem);
      background: var(--gradient-text);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .stat__label {
      font-size: 0.8rem;
      color: var(--white-70);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 0.25rem;
    }

    /* ───────────────────────────── ANIMATIONS ───────────────────────────── */
    @keyframes fadeSlideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ───────────────────────────── RESPONSIVE — TABLET ───────────────────────────── */
    @media (max-width: 900px) {
      .navbar {
        padding: 1rem 1.5rem;
      }

      .navbar__links {
        display: none;
      }

      .navbar__toggle {
        display: flex;
      }

      .hero__body {
        flex-direction: column;
        padding: 0 1.5rem 2rem;
        text-align: center;
      }

      .hero__content {
        align-items: center;
      }

      .hero__title {
        font-size: clamp(3rem, 7vw, 5rem);
      }

      .hero__subtitle {
        max-width: 480px;
      }

      .hero__ctas {
        justify-content: center;
      }

      .hero__visual {
        order: -1;
      }

      .hero__visual img {
        width: clamp(200px, 40vw, 300px);
      }

      .stats {
        margin: 0 1.5rem;
      }
    }

    /* ───────────────────────────── RESPONSIVE — MOBILE ───────────────────────────── */
    @media (max-width: 600px) {
      .navbar {
        padding: 1rem;
      }

      .navbar__logo img {
        height: 32px;
      }

      .navbar__cta {
        display: none;
      }

      .hero__body {
        padding: 0 1rem 1.5rem;
      }

      .hero__visual img {
        width: clamp(160px, 50vw, 240px);
      }

      .hero__title {
        font-size: clamp(2.5rem, 10vw, 3.5rem);
      }

      .hero__subtitle {
        font-size: 0.95rem;
      }

      .hero__ctas {
        flex-direction: column;
        width: 100%;
      }

      .btn {
        justify-content: center;
        width: 100%;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
        margin: 0 1rem;
      }

      /* Reset dividers for 2-col grid */
      .stat + .stat::before {
        display: none;
      }

      /* Vertical dividers: col 2 and col 4 */
      .stat:nth-child(2)::before,
      .stat:nth-child(4)::before {
        display: block;
      }

      /* Horizontal divider after first row */
      .stat:nth-child(3),
      .stat:nth-child(4) {
        border-top: 1px solid var(--white-10);
      }

      .stat {
        padding: 1.25rem 0.5rem;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <!-- Background layers -->
    <div class="hero__bg">
      <div class="hero__bg-image"></div>
      <div class="hero__bg-overlay"></div>
      <div class="hero__bg-glow"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
      <a href="#" class="navbar__logo">
        <img src="assets/logo-version-b-icon.png" alt="Victory Fit" />
      </a>

      <ul class="navbar__links">
        <li><a href="#">La salle</a></li>
        <li><a href="#">Cours</a></li>
        <li><a href="#">Coaching</a></li>
        <li><a href="#">Tarifs</a></li>
        <li><a href="#">Contact</a></li>
      </ul>

      <a href="#" class="navbar__cta">Essai gratuit</a>

      <button class="navbar__toggle" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>

    <!-- Hero Body (2 columns) -->
    <div class="hero__body">
      <!-- Left: text content -->
      <div class="hero__content">
        <h1 class="hero__title">
          Dépassez<br>
          vos <span class="gradient-word">limites.</span>
        </h1>

        <p class="hero__subtitle">
          La salle de sport qui vous pousse à vous surpasser.<br>
          <strong>Sportivement Metz.</strong>
        </p>

        <div class="hero__ctas">
          <a href="#" class="btn btn--primary">Découvrir</a>
          <a href="#" class="btn btn--secondary">
            Nous rejoindre
            <span class="btn__arrow">&rarr;</span>
          </a>
        </div>
      </div>

    </div>

    <!-- Stats Bar -->
    <div class="stats">
      <div class="stat">
        <span class="stat__number">500+</span>
        <span class="stat__label">Membres</span>
      </div>
      <div class="stat">
        <span class="stat__number">30+</span>
        <span class="stat__label">Cours</span>
      </div>
      <div class="stat">
        <span class="stat__number">7j/7</span>
        <span class="stat__label">Accès</span>
      </div>
      <div class="stat">
        <span class="stat__number">100%</span>
        <span class="stat__label">Certifié Coaches</span>
      </div>
    </div>
  </section>

</body>
</html>
